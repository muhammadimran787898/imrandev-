# This is a workflow for build, format, and lint checks
name: imran

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events to the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting Message
        run: |
          echo "🎉 Hello! Thanks for contributing to this project!"
          echo "📦 Starting CI/CD pipeline..."
          echo "🔄 Triggered by: ${{ github.actor }}"
          echo "📝 Commit message: ${{ github.event.head_commit.message }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "⏰ Time: $(date)"
          echo "🚀 Let's build something awesome!"
      
      - name: Custom Greeting with Emojis
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║     🚀 WELCOME TO CI PIPELINE 🚀       ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          echo "👋 Hey ${{ github.actor }}!"
          echo "💻 Your code is being processed..."
          echo "✨ Sit back and relax while we build your project"
          echo ""
  # Build and test job
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v4

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm i

      # Run code formatting check
      - name: Check code formatting
        run: npm run format:check || echo "No format script found, skipping..."

      # Run linting
      - name: Run linter
        run: npm run lint || echo "No lint script found, skipping..."

      # Run type checking (TypeScript)
      - name: Type check
        run: npm run type-check || echo "No type-check script found, skipping..."

      # Run tests
      - name: Run tests
        run: npm test || echo "No test script found, skipping..."

      # Build the project
      - name: Build project
        run: npm run build || echo "No build script found, skipping..."

      # Upload build artifacts (optional)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            build/
            .next/
            out/
          if-no-files-found: ignore

  # Optional: Format and commit back (auto-format)
  format:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run formatter
        run: npm run format || echo "No format script found"
        
      - name: Commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: apply automatic formatting"
          branch: ${{ github.head_ref || github.ref_name }}
        continue-on-error: true
